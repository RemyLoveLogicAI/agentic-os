 path</text><text x="720" y="220" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#1F8F4F" text-anchor="middle" font-style="normal" letter-spacing="0">low risk · whitelisted</text><rect x="560" y="320" width="320" height="130" rx="14" fill="#FFE8F5" stroke="#FF2BD6" stroke-width="3"/><text x="720" y="375" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#84106F" text-anchor="middle" font-style="normal" letter-spacing="0">Approval gate</text><text x="720" y="410" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#FF2BD6" text-anchor="middle" font-style="normal" letter-spacing="0">operator approves · TTL expires</text><rect x="560" y="510" width="320" height="130" rx="14" fill="#FCE8E8" stroke="#C02525" stroke-width="3"/><text x="720" y="565" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#7A1212" text-anchor="middle" font-style="normal" letter-spacing="0">Blocked</text><text x="720" y="600" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#C02525" text-anchor="middle" font-style="normal" letter-spacing="0">denied · timeout</text><rect x="1040" y="240" width="280" height="130" rx="14" fill="#FFFFFF" stroke="#0D32B2" stroke-width="3"/><text x="1180" y="295" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#0A0F25" text-anchor="middle" font-style="normal" letter-spacing="0">Action</text><text x="1180" y="330" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#3A3E50" text-anchor="middle" font-style="normal" letter-spacing="0">CLI · Desktop · API</text><rect x="1040" y="510" width="280" height="130" rx="14" fill="#FFFFFF" stroke="#0D32B2" stroke-width="3"/><text x="1180" y="565" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#0A0F25" text-anchor="middle" font-style="normal" letter-spacing="0">Evidence</text><text x="1180" y="600" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#3A3E50" text-anchor="middle" font-style="normal" letter-spacing="0">ledger · receipts · diff</text><line x1="400" y1="280" x2="560" y2="195" stroke="#1F8F4F" stroke-width="3" marker-end="url(#g-arrow-g)"/><text x="480.0" y="230" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#1F8F4F" text-anchor="middle" font-style="italic" letter-spacing="0">safe</text><line x1="400" y1="305" x2="560" y2="385" stroke="#FF2BD6" stroke-width="3" marker-end="url(#g-arrow-m)"/><text x="480.0" y="360" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FF2BD6" text-anchor="middle" font-style="italic" letter-spacing="0">risky</text><line x1="400" y1="330" x2="560" y2="575" stroke="#C02525" stroke-width="3" marker-end="url(#g-arrow-i)"/><text x="480.0" y="510" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#C02525" text-anchor="middle" font-style="italic" letter-spacing="0">denied</text><line x1="880" y1="195" x2="1040" y2="280" stroke="#1F8F4F" stroke-width="3" marker-end="url(#g-arrow-g)"/><line x1="880" y1="385" x2="1040" y2="305" stroke="#FF2BD6" stroke-width="3" marker-end="url(#g-arrow-m)"/><text x="960.0" y="330" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FF2BD6" text-anchor="middle" font-style="italic" letter-spacing="0">approved</text><line x1="1180" y1="370" x2="1180" y2="510" stroke="#0D32B2" stroke-width="3" marker-end="url(#g-arrow-i)"/><text x="1180.0" y="440" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#0D32B2" text-anchor="middle" font-style="italic" letter-spacing="0">logged</text><line x1="880" y1="575" x2="1040" y2="575" stroke="#C02525" stroke-width="3" marker-end="url(#g-arrow-i)"/><text x="960.0" y="565" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#C02525" text-anchor="middle" font-style="italic" letter-spacing="0">audited</text><text x="60" y="800" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#0D32B2" text-anchor="start" font-style="normal" letter-spacing="0">·  No proof, no claim.</text><text x="60" y="838" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#0D32B2" text-anchor="start" font-style="normal" letter-spacing="0">·  High-risk actions must be approved.</text><text x="60" y="876" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#0D32B2" text-anchor="start" font-style="normal" letter-spacing="0">·  Evidence must accompany every action — including denials.</text><text x="1540" y="876" font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#3A3E50" text-anchor="end" font-style="normal" letter-spacing="3">AGENTIC OS · LOVELOGICAI</text></svg>